<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Groepsbestelling</title>
<style>
  /* Fonts via system stack — works fully offline */

  :root {
    --bg: #1a1410; --card: #252018; --card2: #2e2820;
    --accent: #e8a23a; --accent2: #c4622d;
    --text: #f0e8d8; --muted: #8a7d68;
    --success: #6aaa64; --danger: #c0392b; --border: #3d3528;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body.lang-ne { font-family: 'Noto Sans Devanagari', 'Mangal', Arial Unicode MS, sans-serif; }

  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  .header { background: linear-gradient(135deg,#2e1f0a,#1a1410); border-bottom: 2px solid var(--accent); padding: 14px 20px 10px; position: sticky; top: 0; z-index: 10; }
  .header-title { font-family: Georgia, serif; font-size: 20px; font-weight: 900; color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }

  /* LANG SWITCHER */
  .lang-switcher { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .lang-btn { padding: 5px 10px; font-size: 12px; font-weight: 700; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .lang-btn.active { background: var(--accent); color: #1a1410; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; transition: all 0.15s; user-select: none; }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #1a1410; }
  .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-warn { background: #7a5c10; color: var(--accent); border: 1px solid #a07820; }
  .btn-sm { padding: 6px 11px; font-size: 13px; border-radius: 8px; }
  .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 8px; font-size: 15px; }
  .btn-full { width: 100%; }

  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  /* HOME */
  #home .content { padding: 20px; flex: 1; }
  .welcome-text { font-family: Georgia, serif; font-size: 26px; font-weight: 900; line-height: 1.2; margin-bottom: 6px; }
  .welcome-text span { color: var(--accent); }
  .welcome-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .theme-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 14px 12px 32px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
  .theme-card:active { transform: scale(0.97); }
  .theme-card.selected { border-color: var(--accent); background: #2e2515; }
  .theme-card.selected::after { content: '✓'; position: absolute; top: 8px; right: 10px; color: var(--accent); font-size: 14px; font-weight: 700; }
  .theme-emoji { font-size: 26px; margin-bottom: 5px; }
  .theme-name { font-weight: 600; font-size: 14px; }
  .theme-count { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .theme-edit-btn { position: absolute; bottom: 8px; right: 8px; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 12px; color: var(--muted); cursor: pointer; }
  .theme-card.selected .theme-edit-btn { background: #3a2e18; border-color: #6a5020; color: var(--accent); }
  .theme-actions { display: flex; gap: 8px; margin-bottom: 28px; }

  .history-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .history-item:active { border-color: var(--accent); }
  .history-left { flex: 1; min-width: 0; }
  .history-title { font-weight: 600; font-size: 14px; }
  .history-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .history-summary { font-size: 12px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-arrow { color: var(--muted); font-size: 18px; }

  /* ORDER / THEME EDIT */
  #order .content, #themeedit .content { padding: 16px; flex: 1; }
  .round-info { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .round-theme { font-family: Georgia, serif; font-size: 18px; font-weight: 700; color: var(--accent); }
  .round-badge { background: var(--accent2); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .options-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .option-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .option-item { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .option-item.editing { border-color: var(--accent); }
  .option-name { flex: 1; font-size: 15px; font-weight: 500; background: transparent; border: none; color: var(--text); font-family: inherit; outline: none; }
  .option-name::placeholder { color: var(--muted); }
  .add-option-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-option-input { flex: 1; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: inherit; font-size: 15px; outline: none; }
  .add-option-input:focus { border-color: var(--accent); }
  .add-option-input::placeholder { color: var(--muted); }
  .save-to-theme-bar { background: #2a2010; border: 1px solid #5a4010; border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .save-to-theme-label { font-size: 13px; color: var(--accent); }
  .te-name-row { display: flex; gap: 8px; margin-bottom: 20px; }

  /* VOTE */
  #vote .content { padding: 16px; flex: 1; }
  .voter-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .voter-name-display { font-family: Georgia, serif; font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
  .voter-prompt { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .vote-options { display: flex; flex-direction: column; gap: 10px; }
  .vote-option { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 18px 20px; cursor: pointer; font-size: 17px; font-weight: 600; transition: all 0.15s; text-align: left; color: var(--text); width: 100%; font-family: inherit; }
  .vote-option:active { transform: scale(0.98); }
  .vote-option.selected { border-color: var(--accent); background: #2e2515; color: var(--accent); }
  .vote-option.selected::after { content: ' ✓'; }
  .vote-nav { display: flex; gap: 10px; margin-top: 20px; padding-bottom: 20px; }
  .custom-option-row { margin-top: 14px; background: var(--card2); border: 1.5px dashed var(--border); border-radius: 14px; padding: 14px; transition: border-color 0.2s; }
  .custom-option-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }

  /* SUB-OPTIONS */
  .sub-options-block {
    margin-top: 10px; margin-left: 8px;
    border-left: 3px solid var(--accent); padding-left: 12px;
    display: flex; flex-direction: column; gap: 8px;
    animation: slideDown 0.18s ease;
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .sub-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }
  .sub-group { margin-bottom: 6px; }
  .sub-group-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
  .sub-group-btns { display: flex; flex-wrap: wrap; gap: 7px; }
  .sub-btn { background: var(--card2); border: 2px solid var(--border); border-radius: 10px;
    padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
    color: var(--text); font-family: inherit; transition: all 0.12s; }
  .sub-btn:active { transform: scale(0.96); }
  .sub-btn.selected { border-color: var(--accent); background: #2e2515; color: var(--accent); }
  .sub-btn.selected::after { content: ' ✓'; }
  /* option editor sub-rows */
  .opt-subs { margin-left: 12px; border-left: 2px solid var(--border); padding-left: 10px; margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
  .sub-item { display: flex; align-items: center; gap: 6px; }
  .sub-group-header { display: flex; align-items: center; gap: 6px; margin-top: 8px; margin-bottom: 4px; }
  .sub-group-name-input { flex:1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; color: var(--accent); font-family: inherit; font-size: 13px; font-weight: 600; outline: none; }
  .sub-val-input { flex:1; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 14px; outline: none; border-bottom: 1px solid var(--border); padding: 3px 6px; }
  .sub-val-input::placeholder { color: var(--muted); }

  /* VOTER PICKER */
  #votepicker .content { padding: 16px; flex: 1; }
  .picker-intro { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .voter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .voter-tile {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 14px; padding: 14px 8px 12px;
    cursor: pointer; text-align: center; position: relative;
    transition: all 0.15s; min-height: 80px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  }
  .voter-tile:active { transform: scale(0.96); }
  .voter-tile.done { border-color: var(--success); background: #1a2e1a; }
  .voter-tile.done::after { content: '✓'; position: absolute; top: 5px; right: 8px; color: var(--success); font-size: 13px; font-weight: 900; }
  .voter-tile.guest { border-style: dashed; border-color: var(--accent2); background: #2a1a10; }
  .voter-tile-name { font-size: 13px; font-weight: 700; line-height: 1.2; word-break: break-word; }
  .voter-tile-choice { font-size: 11px; color: var(--accent); margin-top: 2px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .voter-tile-badge { font-size: 10px; color: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .picker-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .picker-actions { display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
  .guest-add-row { display: flex; gap: 8px; margin-bottom: 20px; }

  /* RESULTS */
  #results .content { padding: 16px; flex: 1; }
  .results-theme { font-family: Georgia, serif; font-size: 24px; font-weight: 900; color: var(--accent); margin-bottom: 4px; }
  .results-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .result-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .result-item { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .result-count { font-family: Georgia, serif; font-size: 32px; font-weight: 900; color: var(--accent); min-width: 44px; text-align: center; }
  .result-count.zero { color: var(--muted); }
  .result-info { flex: 1; }
  .result-name { font-size: 16px; font-weight: 600; }
  .result-voters { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .result-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .result-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s; }
  .result-bar.empty { background: var(--border); }
  .pending-section { background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 20px; }
  .pending-title { font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .pending-names { font-size: 14px; color: var(--text); line-height: 1.8; }
  .results-actions { display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }

  /* NAMES */
  #names .content { padding: 16px; flex: 1; }
  .names-intro { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  .names-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .name-item { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; }
  .name-num { color: var(--muted); font-size: 12px; min-width: 20px; }
  .name-input { flex: 1; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 15px; outline: none; }
  .name-input::placeholder { color: var(--muted); }

  /* HISTORY DETAIL */
  #histdetail .content { padding: 16px; flex: 1; }
  .hd-header-block { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 20px; }
  .hd-theme { font-family: Georgia, serif; font-size: 22px; font-weight: 900; color: var(--accent); }
  .hd-date { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .hd-totals { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
  .hd-total-item { display: flex; align-items: flex-start; gap: 10px; }
  .hd-count { font-family: Georgia, serif; font-size: 28px; font-weight: 900; color: var(--accent); min-width: 42px; text-align: center; line-height: 1; padding-top: 2px; }
  .hd-count.zero { color: var(--muted); }
  .hd-opt-info { flex: 1; }
  .hd-opt-name { font-size: 15px; font-weight: 600; }
  .hd-opt-names { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.6; }
  .hd-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .hd-bar { height: 100%; background: var(--accent); border-radius: 2px; }
  .hd-per-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .hd-per-item:last-child { border-bottom: none; }
  .hd-per-name { font-weight: 500; }
  .hd-per-choice { color: var(--accent); font-weight: 600; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card2); border: 1px solid var(--border); border-radius: 18px; padding: 24px; width: 100%; max-width: 400px; }
  .modal-title { font-family: Georgia, serif; font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .modal-body { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  .modal-input { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 15px; outline: none; margin-bottom: 16px; }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--success); color: white; padding: 10px 20px; border-radius: 30px; font-weight: 600; font-size: 14px; z-index: 200; transition: transform 0.3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="header">
    <div class="header-title">🍵 <span data-t="appTitle"></span></div>
    <div class="header-sub" data-t="appSub"></div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" onclick="showScreen('names')" data-t="btnNames"></button>
      <button class="btn btn-secondary btn-sm" onclick="showAddThemeModal()" data-t="btnAddTheme"></button>
      <button class="btn btn-secondary btn-sm" onclick="confirmReset()" style="color:var(--muted)">↺</button>
      <div class="lang-switcher">
        <button class="lang-btn" onclick="setLang('nl')">NL</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('ne')">नेपाली</button>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="welcome-text"><span data-t="homeWelcome1"></span> <span><span data-t="homeWelcome2"></span></span></div>
    <div class="welcome-sub" data-t="homeWelcomeSub"></div>
    <div class="section-label" data-t="labelThemes"></div>
    <div class="theme-grid" id="themeGrid"></div>
    <div class="theme-actions">
      <button class="btn btn-primary btn-full" onclick="startOrder()" data-t="btnStartOrder"></button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="section-label" style="margin:0" data-t="labelHistory"></div>
      <button class="btn btn-secondary btn-sm" id="clearHistBtn" onclick="confirmClearHistory()" style="display:none" data-t="btnClearAll"></button>
    </div>
    <div id="historyList"></div>
    <div style="height:20px"></div>
  </div>
</div>

<!-- NAMES -->
<div id="names" class="screen">
  <div class="header">
    <div class="header-title" data-t="namesTitle"></div>
    <div class="header-sub" data-t="namesSub"></div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" onclick="showScreen('home')" data-t="btnBack"></button>
      <button class="btn btn-primary btn-sm" onclick="saveNames()" data-t="btnSave"></button>
    </div>
  </div>
  <div class="content">
    <div class="names-intro" data-t="namesIntro"></div>
    <div class="names-list" id="namesList"></div>
    <button class="btn btn-secondary btn-sm" onclick="addNameField()" data-t="btnAddName"></button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- THEME EDIT -->
<div id="themeedit" class="screen">
  <div class="header">
    <div class="header-title" id="teTitle"></div>
    <div class="header-sub" data-t="teHeaderSub"></div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" onclick="showScreen('home')" data-t="btnBack"></button>
      <button class="btn btn-primary btn-sm" onclick="saveThemeEdit()" data-t="btnSave"></button>
    </div>
  </div>
  <div class="content">
    <div class="names-intro" data-t="teIntro"></div>
    <div class="section-label" data-t="teNameLabel"></div>
    <div class="te-name-row">
      <input class="add-option-input" id="teEmoji" placeholder="🍵" maxlength="5" style="max-width:66px;flex:none">
      <input class="add-option-input" id="teName" data-placeholder-t="tePlaceholderName" style="flex:1">
    </div>
    <div class="section-label" data-t="teOptionsLabel"></div>
    <div class="option-list" id="teOptionList"></div>
    <div class="add-option-row">
      <input class="add-option-input" id="teNewOption" data-placeholder-t="placeholderNewOption" onkeydown="if(event.key==='Enter')addTeOption()">
      <button class="btn btn-primary btn-sm" onclick="addTeOption()">+</button>
    </div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteTheme()" data-t="btnDeleteTheme"></button>
    </div>
    <div style="height:20px"></div>
  </div>
</div>

<!-- ORDER -->
<div id="order" class="screen">
  <div class="header">
    <div class="header-title" data-t="orderTitle"></div>
    <div class="header-sub" data-t="orderSub"></div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" onclick="showScreen('home')" data-t="btnBack"></button>
      <button class="btn btn-primary btn-sm" onclick="startVoting()" data-t="btnVote"></button>
    </div>
  </div>
  <div class="content">
    <div class="round-info">
      <div>
        <div class="round-theme" id="orderThemeName"></div>
        <div style="font-size:12px;color:var(--muted)" data-t="orderRoundSub"></div>
      </div>
      <div class="round-badge" id="orderOptionCount"></div>
    </div>
    <div class="save-to-theme-bar">
      <div class="save-to-theme-label" data-t="savePermanentLabel"></div>
      <button class="btn btn-warn btn-sm" onclick="saveCurrentToTheme()" data-t="btnSaveDefault"></button>
    </div>
    <div class="options-header">
      <div class="section-label" style="margin:0" data-t="labelOptions"></div>
      <button class="btn btn-secondary btn-sm" onclick="resetToThemeDefaults()" data-t="btnReset"></button>
    </div>
    <div class="option-list" id="optionList"></div>
    <div class="add-option-row">
      <input class="add-option-input" id="newOptionInput" data-placeholder-t="placeholderNewOption" onkeydown="if(event.key==='Enter')addOption()">
      <button class="btn btn-primary btn-sm" onclick="addOption()">+</button>
    </div>

let currentLang = 'nl';
function t(key, ...args) {
  const val = LANGS[currentLang][key];
  return typeof val === 'function' ? val(...args) : (val ?? LANGS.nl[key] ?? key);
}

function setLang(lang) {
  currentLang = lang;
  state.lang = lang;
  save();
  // Update body font class
  document.body.className = lang === 'ne' ? 'lang-ne' : '';
  // Update all static data-t elements
  document.querySelectorAll('[data-t]').forEach(el => {
    el.textContent = t(el.dataset.t);
  });
  document.querySelectorAll('[data-placeholder-t]').forEach(el => {
    el.placeholder = t(el.dataset.placeholderT);
  });
  // Update lang button active state
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === (lang === 'nl' ? 'NL' : lang === 'en' ? 'EN' : 'नेपाली'));
  });
  // Re-render current screen
  const active = document.querySelector('.screen.active');
  if (active) {
    const id = active.id;
    const renders = { home: renderHome, names: renderNames, order: renderOrder,
      vote: renderVote, votepicker: renderVotePicker, results: renderResults, histdetail: renderHistDetail, themeedit: renderThemeEdit };
    if (renders[id]) renders[id]();
  }
}

//  OPTION HELPERS
// ═══════════════════════════════════════
// An option is either a plain string OR {label, subs:[{group, values:[]}]}
function optLabel(o)   { return typeof o === 'string' ? o : o.label; }
function optSubs(o)    { return (typeof o === 'object' && o.subs) ? o.subs : []; }
function hasSubs(o)    { return optSubs(o).length > 0; }
// Build the composite vote string: "Label · GroupA:Val · GroupB:Val"
function buildChoice(label, subSelections) {
  const parts = [label];
  for (const [group, val] of Object.entries(subSelections)) {
    if (val) parts.push(val);
  }
  return parts.join(' · ');
}

let state = { themes:[], names:[], selectedThemeId:null, currentOptions:[], votes:{}, voterIndex:0, history:[], lang:'nl', guests:[], currentVoterKey:null, currentVoterName:null };
let editingThemeId = null;
let viewingHistIdx = null;

function save() {
  try { localStorage.setItem('gb6', JSON.stringify(state)); } catch(e){
    // localStorage not available (file://) — keep in memory only
    window._gbMemory = JSON.stringify(state);
  }
}
function load() {
  try {
    const raw = (()=>{ try { return localStorage.getItem('gb6'); } catch(e){ return window._gbMemory||null; } })();
    if (raw) state = {...state, ...JSON.parse(raw)};
  } catch(e) { try { localStorage.removeItem('gb6'); } catch(_){} }
  if (!Array.isArray(state.themes) || !state.themes.length) state.themes = JSON.parse(JSON.stringify(DEFAULT_THEMES));
  if (!Array.isArray(state.names)  || !state.names.length)  state.names = [
    'Saskia','Hendrik','Noor','Dries',
    'Sara','Tim','Juno','Mira','Sten',
    'Tom','Winny','Myhra','Elyn','Yanti',
    'Lieve','Maarten','Sara De Jonge','Tess'
  ];
  if (!Array.isArray(state.history)) state.history = [];
  if (!state.votes || typeof state.votes !== 'object') state.votes = {};
  if (!Array.isArray(state.currentOptions)) state.currentOptions = [];
  if (typeof state.voterIndex !== 'number') state.voterIndex = 0;
  if (!Array.isArray(state.guests)) state.guests = [];
  if (state.lang) currentLang = state.lang;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const renders = { home:renderHome, names:renderNames, order:renderOrder, vote:renderVote,
    votepicker:renderVotePicker, results:renderResults, histdetail:renderHistDetail, themeedit:renderThemeEdit };
  if (renders[id]) renders[id]();
  window.scrollTo(0,0);
}

  document.getElementById('themeGrid').innerHTML = state.themes.map(th => `
    <div class="theme-card ${state.selectedThemeId===th.id?'selected':''}" onclick="selectTheme('${th.id}')">
      <div class="theme-emoji">${th.emoji}</div>
      <div class="theme-name">${esc(themeName(th))}</div>

      <div class="theme-edit-btn" onclick="event.stopPropagation();openThemeEdit('${th.id}')">${t('btnEditShort')}</div>

  if (!state.history.length) {
    hist.innerHTML = `<span style="color:var(--muted);font-size:14px">${t('noHistory')}</span>`;
    clearBtn.style.display = 'none';
  } else {
    clearBtn.style.display = '';
    hist.innerHTML = state.history.slice().reverse().map((h, ri) => {
      const realIdx = state.history.length - 1 - ri;
      const top = summarize(h.votes, h.options).filter(([,c])=>c>0).slice(0,3).map(([o,c])=>`${c}× ${o}`).join(', ');
      return `<div class="history-item" onclick="openHistDetail(${realIdx})">
        <div class="history-left">
          <div class="history-title">${h.emoji} ${esc(h.theme)}</div>
          <div class="history-meta">${t('datePrefix')}${h.datetime}</div>
          <div class="history-summary">${esc(top||'—')}</div>
        </div>
        <div class="history-arrow">›</div>
      </div>`;
    }).join('');
  }
}

function updateTeSubVal(i,gi,vi,v){ state.themes.find(x=>x.id===editingThemeId).options[i].subs[gi].values[vi]=v; }
function saveThemeEdit(){
  const th=state.themes.find(x=>x.id===editingThemeId);
  // Rebuild options entirely from DOM to capture any unsaved input state
  const optionItems = document.querySelectorAll('#teOptionList > div');
  optionItems.forEach((item, i) => {
    if(i >= th.options.length) return;
    // Read main label
    const labelInp = item.querySelector('.option-name');
    if(labelInp) updateTeOptLabel(i, labelInp.value);
    // Read sub group names and values
    const subGroups = item.querySelectorAll('.opt-subs .sub-group-header');
    const subValsBlocks = item.querySelectorAll('.opt-subs > div');
    // Simpler: just read all sub-group-name-inputs and sub-val-inputs in order
    if(typeof th.options[i] === 'object') {
      const groupInputs = item.querySelectorAll('.sub-group-name-input');
      groupInputs.forEach((inp, gi) => {
        if(th.options[i].subs[gi]) th.options[i].subs[gi].group = inp.value;
      });
      const valInputs = item.querySelectorAll('.sub-val-input');
      // Map val inputs back: they're sequential across all groups
      let vi_global = 0;
      th.options[i].subs.forEach((sg, gi) => {
        sg.values.forEach((_, vi) => {
          const inp = valInputs[vi_global++];
          if(inp) sg.values[vi] = inp.value;
        });
      });
    }
  });
  th.emoji = document.getElementById('teEmoji').value.trim()||th.emoji;
  const newName = document.getElementById('teName').value.trim();
  if (newName) { if (typeof th.name === 'object') th.name[currentLang] = newName; else th.name = newName; }
  save(); toast(t('toastThemeSaved')); showScreen('home');
}

// ═══════════════════════════════════════
//  VOTE (single person)
// ═══════════════════════════════════════
// Track sub-selections per active option: { groupName: chosenValue }
// votes[key] = array of choice-strings, e.g. ["Thee","Koekje"] or ["Set·Koffie·Jam"]
// activeSubSels: for the option currently being sub-configured: {group: val}
let activeSubSels = {};     // sub-selections for the option being expanded
let expandedOption = null;  // which main option label is currently expanded for sub-selection

// ─── helpers ───────────────────────────────────────────────────────────────
function getSelections(key){ return state.votes[key] || []; }

function isSelected(key, lbl){
  return getSelections(key).some(s => s === lbl || s.startsWith(lbl + ' · '));
}

function getCompositeFor(key, lbl){
  return (getSelections(key)).find(s => s === lbl || s.startsWith(lbl + ' · ')) || null;
}

// ─── render ────────────────────────────────────────────────────────────────
function renderVote(){
  const th=state.themes.find(x=>x.id===state.selectedThemeId);
  const key=state.currentVoterKey, name=state.currentVoterName;
  const voters=allVoters(), total=voters.length;
  const doneCount=Object.keys(state.votes).length;
  document.getElementById('voteThemeName').textContent=th.emoji+' '+themeName(th);
  document.getElementById('voteHeaderSub').textContent=t('votedCount',doneCount,total);
  document.getElementById('voterName').textContent=name;

  const sels = getSelections(key);

  document.getElementById('voteOptions').innerHTML=state.currentOptions.map(o=>{
    const lbl=optLabel(o);
    const sel=isSelected(key,lbl);
    const expanded=expandedOption===lbl;
    // Badge showing sub-choice if selected
    const composite=getCompositeFor(key,lbl);
    const subBadge = composite && composite.includes(' · ')
      ? `<span style="font-size:11px;color:var(--accent);margin-left:6px">${esc(composite.split(' · ').slice(1).join(' · '))}</span>` : '';
    return `<div>
      <button class="vote-option ${sel?'selected':''}" onclick="toggleOption('${escA(lbl)}')" style="display:flex;justify-content:space-between;align-items:center">
        <span>${esc(lbl)}</span>${subBadge}
      </button>
      ${(sel||expanded)&&hasSubs(o)?renderSubBlocks(o,lbl):''}
    </div>`;
  }).join('');

  // custom input — show if any selection is fully custom
  const customInp=document.getElementById('customVoteInput');
  const knownLabels=state.currentOptions.map(optLabel);
  const customSels=sels.filter(s=>!knownLabels.some(l=>s===l||s.startsWith(l+' · ')));
  customInp.value=customSels.join(', ');
  customInp.placeholder=t('customPlaceholder');
  document.getElementById('customRow').style.borderColor=customSels.length?'var(--accent)':'';
}

function renderSubBlocks(opt, lbl){
  const subs=optSubs(opt);
  if(!subs.length) return '';
  // Use activeSubSels if this is the expanded one, else parse from existing vote
  const composite=getCompositeFor(state.currentVoterKey, lbl)||'';
  const existingParts=composite.split(' · ').slice(1);
  const html=subs.map((sg,gi)=>{
    const chosen = expandedOption===lbl
      ? (activeSubSels[sg.group]||'')
      : (existingParts[gi]||'');
    const btns=sg.values.filter(v=>v.trim()).map(v=>`
      <button class="sub-btn ${chosen===v?'selected':''}" onclick="selectSubVal('${escA(lbl)}','${escA(sg.group)}','${escA(v)}')">${esc(v)}</button>`).join('');
    return `<div class="sub-group">
      ${sg.group?`<div class="sub-group-label">${esc(sg.group)}</div>`:''}
      <div class="sub-group-btns">${btns}</div>
    </div>`;
  }).join('');
  return `<div class="sub-options-block"><div class="sub-label">${t('subLabel')}</div>${html}</div>`;
}

// ─── selection logic ────────────────────────────────────────────────────────
function toggleOption(lbl){
  document.getElementById('customVoteInput').value='';
  document.getElementById('customRow').style.borderColor='';
  const key=state.currentVoterKey;
  const opt=state.currentOptions.find(o=>optLabel(o)===lbl);

  if(isSelected(key,lbl)){
    // Deselect — remove this choice
    state.votes[key]=(state.votes[key]||[]).filter(s=>s!==lbl && !s.startsWith(lbl+' · '));
    if(!state.votes[key].length) delete state.votes[key];
    if(expandedOption===lbl){ expandedOption=null; activeSubSels={}; }
  } else {
    // Select
    if(hasSubs(opt)){
      // Expand for sub-selection; pre-fill first values
      expandedOption=lbl; activeSubSels={};
      optSubs(opt).forEach(sg=>{ if(sg.values[0]) activeSubSels[sg.group]=sg.values[0]; });
      commitSubVote(lbl);
    } else {
      if(!state.votes[key]) state.votes[key]=[];
      state.votes[key].push(lbl);
      expandedOption=null;
    }
  }
  save(); // FIX 2: auto-save on every selection
  renderVote();
}

function selectSubVal(lbl, group, val){
  activeSubSels[group]=val;
  commitSubVote(lbl);
  save(); // FIX 2: auto-save
  renderVote();
}

function commitSubVote(lbl){
  const key=state.currentVoterKey;
  const opt=state.currentOptions.find(o=>optLabel(o)===lbl);
  const subs=opt?optSubs(opt):[];
  const parts=[lbl];
  subs.forEach(sg=>{ if(activeSubSels[sg.group]) parts.push(activeSubSels[sg.group]); });
  const composite=parts.join(' · ');
  if(!state.votes[key]) state.votes[key]=[];
  // Replace existing composite for this label if present
  const idx=state.votes[key].findIndex(s=>s===lbl||s.startsWith(lbl+' · '));
  if(idx>=0) state.votes[key][idx]=composite;
  else state.votes[key].push(composite);
}

function castVoteBtn(o){ toggleOption(optLabel(o)); }

function onCustomInput(val){
  const key=state.currentVoterKey;
  const trimmed=val.trim();
  // Remove previous custom entries, keep known-option selections
  const knownLabels=state.currentOptions.map(optLabel);
  if(!state.votes[key]) state.votes[key]=[];
  state.votes[key]=state.votes[key].filter(s=>knownLabels.some(l=>s===l||s.startsWith(l+' · ')));
  if(trimmed){
    state.votes[key].push(trimmed);
    document.getElementById('customRow').style.borderColor='var(--accent)';
  } else {
    document.getElementById('customRow').style.borderColor='';
  }
  if(!state.votes[key].length) delete state.votes[key];
  expandedOption=null; activeSubSels={};
  save(); // FIX 2: auto-save
  // re-render buttons without full renderVote to keep cursor
  document.getElementById('voteOptions').innerHTML=state.currentOptions.map(o=>{
    const lbl=optLabel(o);
    return `<div><button class="vote-option ${isSelected(key,lbl)?'selected':''}" onclick="toggleOption('${escA(lbl)}')">${esc(lbl)}</button></div>`;
  }).join('');
}

function confirmVote(){
  const key=state.currentVoterKey;
  const choices=getSelections(key);
  if(!choices.length){toast(t('toastNeedChoice'));return;}
  // Add fully custom choices as plain options for future voters
  const knownLabels=state.currentOptions.map(optLabel);
  choices.forEach(choice=>{
    const baseLabel=choice.split(' · ')[0];
    if(!knownLabels.includes(baseLabel)){
      state.currentOptions.push(choice);
      toast(t('toastCustomAdded',choice));
    }
  });
  expandedOption=null; activeSubSels={};
  save();
  backToPicker();
}

// ═══════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════
function renderResults(){
  const th=state.themes.find(x=>x.id===state.selectedThemeId);
  const voters=allVoters(), voted=Object.keys(state.votes), pending=voters.filter(v=>!(state.votes[v.key]&&state.votes[v.key].length));
  document.getElementById('resultsThemeName').textContent=th.emoji+' '+themeName(th);
  document.getElementById('resultsSub2').textContent=t('votedCount',voted.length,voters.length);
  document.getElementById('resultSub').textContent=fmtDT(new Date());
  const sorted=summarize(state.votes,state.currentOptions), max=sorted.length?sorted[0][1]:1;
  document.getElementById('resultList').innerHTML=sorted.map(([o,c])=>{
    const voters=Object.entries(state.votes).filter(([,arr])=>(Array.isArray(arr)?arr:[arr]).includes(o)).map(([n])=>n).join(', ');
    return `<div class="result-item">
      <div class="result-count ${c===0?'zero':''}">${c}</div>
      <div class="result-info">
        <div class="result-name">${esc(o)}</div>
        ${c>0?`<div class="result-voters">${esc(voters)}</div>`:''}
        <div class="result-bar-wrap"><div class="result-bar ${c===0?'empty':''}" style="width:${max>0?c/max*100:0}%"></div></div>
      </div></div>`;
  }).join('');
  if(pending.length){
    document.getElementById('pendingSection').style.display='';
    document.getElementById('pendingNames').textContent=pending.map(v=>v.name).join(' · ');
    document.getElementById('continueVoteBtn').style.display='';
  } else {
    document.getElementById('pendingSection').style.display='none';
    document.getElementById('continueVoteBtn').style.display='none';
  }
}
function continueVoting(){
  showScreen('votepicker');
}
function finalizeRound(){
  const th=state.themes.find(x=>x.id===state.selectedThemeId);
  // Remap guest_xxx keys to readable names before storing
  const namedVotes={};
  const guestMap={};
  (state.guests||[]).forEach(g=>{ guestMap[g.id]=g.name; });
  Object.entries(state.votes).forEach(([key,val])=>{
    const displayName = guestMap[key] || key;
    namedVotes[displayName]=val;
  });
  state.history.push({ id:Date.now(), themeId:th.id, theme:themeName(th), emoji:th.emoji,
    datetime:fmtDT(new Date()), options:[...state.currentOptions], votes:namedVotes,
    guests:(state.guests||[]).map(g=>g.name) });
  state.votes={}; state.guests=[]; state.currentVoterKey=null; state.currentVoterName=null;
  save(); toast(t('toastRoundSaved')); showScreen('home');
}

// ═══════════════════════════════════════
//  HISTORY DETAIL
// ═══════════════════════════════════════
function openHistDetail(idx){ viewingHistIdx=idx; showScreen('histdetail'); }
function renderHistDetail(){
  const h=state.history[viewingHistIdx]; if(!h){showScreen('home');return;}
  document.getElementById('hdTitle').textContent=h.emoji+' '+h.theme;
  document.getElementById('hdSub').textContent=h.datetime;
  document.getElementById('hdTheme').textContent=h.emoji+' '+h.theme;
  document.getElementById('hdDate').textContent=t('datePrefix')+h.datetime;
  const sorted=summarize(h.votes,h.options), max=sorted.length?sorted[0][1]:1;
  document.getElementById('hdTotals').innerHTML=sorted.map(([o,c])=>{
    const who=Object.entries(h.votes).filter(([,arr])=>(Array.isArray(arr)?arr:[arr]).includes(o)).map(([n])=>n).join(' · ');
    return `<div class="hd-total-item">
      <div class="hd-count ${c===0?'zero':''}">${c}</div>
      <div class="hd-opt-info">
        <div class="hd-opt-name">${esc(o)}</div>
        <div class="hd-bar-wrap"><div class="hd-bar" style="width:${max>0?c/max*100:0}%;${c===0?'background:var(--border)':''}"></div></div>
        ${c>0?`<div class="hd-opt-names">${esc(who)}</div>`:''}
      </div></div>`;
  }).join('');
  document.getElementById('hdPerList').innerHTML=Object.entries(h.votes)
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([n,arr])=>{
      const choices=Array.isArray(arr)?arr:[arr];
      return `<div class="hd-per-item"><div class="hd-per-name">${esc(n)}</div><div class="hd-per-choice">${esc(choices.join(' + '))}</div></div>`;
    }).join('');
}
function deleteHistoryItem(){
  confirm2(t('confirmDeleteOrder'),t('confirmDeleteOrderBody'),()=>{
    state.history.splice(viewingHistIdx,1); save(); toast(t('toastDeleted')); showScreen('home');
  });
}
function confirmClearHistory(){
  confirm2(t('confirmClearHist'),t('confirmClearHistBody'),()=>{
    state.history=[]; save(); toast(t('toastHistCleared')); renderHome();
  });
}

// ═══════════════════════════════════════
//  ADD THEME MODAL
// ═══════════════════════════════════════
function showAddThemeModal(){ openModal('addThemeModal'); }
function addTheme(){
  const name=document.getElementById('newThemeName').value.trim();
  const emoji=document.getElementById('newThemeEmoji').value.trim()||'📋';
  if(!name){toast(t('toastNeedName'));return;}
  state.themes.push({id:'c_'+Date.now(), name:{nl:name,en:name,ne:name}, emoji, options:[]});
  save(); closeModal('addThemeModal');
  document.getElementById('newThemeName').value=''; document.getElementById('newThemeEmoji').value='';
  renderHome(); toast(t('toastThemeAdded'));
}

// ═══════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function confirm2(title,body,cb){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmBody').textContent=body;
  document.getElementById('confirmOkBtn').onclick=()=>{closeModal('confirmModal');cb();};
  openModal('confirmModal');
}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); });
});

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function summarize(votes,options){
  const c={};
  options.forEach(o=>{ c[optLabel(o)]=0; });
  // votes[key] is now an array of choice strings
  Object.values(votes).forEach(arr=>{
    const items=Array.isArray(arr)?arr:[arr]; // backwards compat
    items.forEach(v=>{ c[v]=(c[v]||0)+1; });
  });
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}
function fmtDT(d){
  return d.toLocaleDateString('nl-BE',{day:'2-digit',month:'2-digit',year:'numeric'})
    +' · '+d.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s){ return String(s).replace(/'/g,"\\'"); }

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

function confirmReset(){
  confirm2(t('confirmReset'),t('confirmResetBody'),()=>{
    try { localStorage.removeItem('gb6'); } catch(e){} window._gbMemory=null; try { location.reload(); } catch(e){ location.href=location.href; }
  });
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
// ── INIT ──────────────────────────────────────────────────────────────────
function init() {
  // Brave browser blocks localStorage on file:// — detect and warn
  (async () => {
    try {
      const isBrave = (navigator.brave && await navigator.brave.isBrave()) || false;
      if (isBrave) {
        const warn = document.createElement('div');
        warn.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c4622d;color:#fff;padding:12px 16px;font-size:14px;font-weight:600;z-index:9999;text-align:center;';
        warn.textContent = '⚠️ Brave browser: open dit bestand in Chrome voor beste werking.';
        document.body.prepend(warn);
      }
    } catch(e){}
  })();
  try {
    load();
  } catch(e) {
    console.error('load() failed:', e);
  }
  try {
    setLang(currentLang);
  } catch(e) {
    console.error('setLang() failed:', e);
  }
  try {
    renderHome();
  } catch(e) {
    console.error('renderHome() failed:', e);
    // Show visible error so user isn't staring at blank screen
    document.body.innerHTML += '<div style="color:#e8a23a;padding:20px;font-size:16px">⚠️ Fout bij laden: ' + e.message + '<br><br>Probeer Chrome i.p.v. Brave.</div>';
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
